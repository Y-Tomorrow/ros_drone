target_searcher:
  wide:
    enable_task1_decel: true              # 开：每帧 vx 减速
    enable_task2_gimbal_deflect: true     # 开：云台按 pixel 偏转
    enable_task3_translate: false         # 开：低速时 vy/vz 增量
    enable_task3_yaw_rate: true          # 开：低速时 yaw_rate 增量

    timeout_s: 5.0                       # 超时后指令全 INF

    decel_mps2: 0.2                       # vx 减速率 (m/s²)
    min_vx_mps: -0.3                      # vx 下限 (m/s，可负)
    max_vx_drop_from_lost_mps: 0.5        # 相对丢失瞬间实测 vx，指令 vx 最多再降多少；0=不限制
    cmd_vx_limit_mps: 5.0                # |vx| 上限

    gimbal_roll_rad: 0.0                 # 云台 roll (rad)
    gimbal_pitch_gain_rad: 0.05          # pixel_y → pitch 增益
    gimbal_yaw_gain_rad: 0.05            # pixel_x → yaw 增益
    gimbal_pitch_limit_rad: 1.2          # pitch 偏转限幅 (rad)
    gimbal_yaw_limit_rad: 1.4            # yaw 偏转限幅 (rad)

    vxyzy_keep_threshold: [4.0, 4.0, 1.0, 0.2] # body速度各通道阈值：[vx,vy,vz,yaw_rate]；|当前|<阈值则该通道从0起算并可叠加task3，否则保持当前
    translate_gain_mps: 0.1              # pixel → vx/vy 增量增益
    cmd_vy_limit_mps: 0.3                # |vy| 上限
    yaw_rate_gain_rps: 0.05               # pixel_x → yaw_rate 增益 (rad/s)
    yaw_rate_limit_rps: 0.2              # |yaw_rate| 上限 (rad/s)
    body_yaw_limit_rad: 0.8             # 机体航向最大偏角 (rad)；0或负为不限制 (~1.57≈90°)
